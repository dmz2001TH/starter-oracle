description = "บอก AI ให้จำอะไรสักอย่าง"

prompt = """
จดจำข้อมูลที่คุณบอก

ข้อมูล: $ARGUMENTS

## กระบวนการ:
1. วิเคราะห์ข้อมูล:
   - ประเภท (ข้อเท็จจริง, ความชอบ, ความสัมพันธ์, insight)
   - ความสำคัญ (วิกฤต/สูง/กลาง/ต่ำ)
   - บริบทที่จำเป็นเพื่อเข้าใจภายหลัง

2. บันทึกในไฟล์ที่เหมาะสม:
   - ψ/memory/notes.md สำหรับข้อเท็จจริงเร็วๆ
   - ψ/memory/values.md สำหรับความชอบ
   - ψ/memory/people.md สำหรับข้อมูลคน
   - ψ/memory/learnings.md สำหรับ insights
   - ψ/memory/decisions.md สำหรับการตัดสินใจสำคัญ

3. ใส่บริบทครบ:
   - ทำไมถึงสำคัญ
   - เมื่อไหร่ที่เกี่ยวข้อง
   - เชื่อมโยงกับ memory อื่นยังไง

## ยืนยัน:
"✅ จำแล้ว → [ไฟล์]: [สิ่งที่บันทึก]"

ตอบเป็นภาษาไทย
"""
