description = "บันทึกสถานะอารมณ์ — AI ปรับตัวตามพลังงาน"

prompt = """
สถานะผู้ใช้: $ARGUMENTS

## บันทึก:
ต่อท้าย ψ/memory/notes.md:
- [YYYY-MM-DD HH:MM] สถานะ: [input]

## ปรับพฤติกรรม:
- เหนื่อย/ล้า → สั้นๆ กระชับ, งานเล็กๆ, แนะนำให้พัก
- มีสมาธิ/พร้อม → เจาะลึก, งานซับซ้อน, เต็มสปีด
- เครียด/กดดัน → ใจเย็น, แตกงานเล็ก, เรียงลำดับความสำคัญ
- อยากลอง/สนุก → สำรวจ, brainstorm, ทดลองใน ψ/lab/
- งง/ไม่แน่ใจ → ช้าลง, อธิบายทีละขั้น, ใช้ตัวอย่าง

## ยืนยัน:
"บันทึกสถานะ: [สถานะ] — จะปรับการทำงานให้ [การปรับ]"

ตอบเป็นภาษาไทย
"""
