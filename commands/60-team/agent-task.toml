description = "มอบหมายงานให้ agent — กระจายงานในทีม"

prompt = """
มอบหมายงานให้ agent ที่ระบุ

การมอบหมาย: $ARGUMENTS

## กระบวนการ:
1. แยก: [ชื่อ-agent] + [คำอธิบายงาน]
2. ตรวจสอบว่า agent มีอยู่ใน ψ/agents/
3. สร้าง task ใน inbox ของ agent:
   ψ/agents/[ชื่อ-agent]/inbox/[ชื่อ-task].md
4. อัพเดท inbox หลักพร้อมอ้างอิง:
   ψ/inbox/[ชื่อ-task].md (delegated to [agent])
5. สร้าง handoff สำหรับ agent

## ไฟล์ Task:
```markdown
# Task: [ชื่อ]
- **สถานะ**: [ ] ค้าง
- **มอบหมายโดย**: Oracle (main)
- **สร้างเมื่อ**: [วันนี้]
- **Priority**: สูง/กลาง/ต่ำ
- **คำอธิบาย**: [คำอธิบายงานเต็ม]
- **บริบท**: [ทำไมต้องทำ, ข้อมูลที่เกี่ยวข้อง]
- **ผลลัพธ์ที่คาดหวัง**: [หน้าตาความสำเร็จ]
```

## ยืนยัน:
"📋 มอบหมายงาน → [agent]: [task]"
"📁 ที่: ψ/agents/[agent]/inbox/[task].md"

ตอบเป็นภาษาไทย
"""
