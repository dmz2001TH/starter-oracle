3. ค้นตามเวลา — ถ้าคำค้น提到เวลา ดู retrospective/
4. อ้างอิงข้าม — เชื่อมโยง memory ที่เกี่ยวข้อง

## นำเสนอ:
```markdown
## 💭 Recall: "[คำค้น]"

### ตรงกัน:
- [ข้อมูลที่ตรง พร้อมบริบทเต็ม]

### เกี่ยวข้อง:
- [memory ที่เกี่ยวข้อง พร้อมคำอธิบายว่าเชื่อมยังไง]

### Timeline:
- [เมื่อไหร่ที่提到ครั้งแรก]
- [วิวัฒนาการผ่าน session]

### สรุป:
- [สังเคราะห์ memory ทั้งหมดที่เกี่ยวข้อง]
```

