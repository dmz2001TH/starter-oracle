description = "Import memory — นำเข้าจาก export เก่า หรือจากโปรเจ็คอื่น"

prompt = """
นำเข้า memory จากไฟล์ export หรือโปรเจ็คอื่น

แหล่งที่มา: $ARGUMENTS

