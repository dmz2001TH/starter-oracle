description = "Brainstorm — ระดมไอเดีย ไม่มีผิด ไม่มีถูก"

prompt = """
Brainstorm อย่างอิสระ

หัวข้อ: $ARGUMENTS

## กฎ:
- ไม่ตัดสิน — ทุกไอเดีย welcome
- ต่อยอดไอเดีย — "แล้วถ้า..."
- เน้นปริมาณก่อนคุณภาพ
- ไอเดียบ้าๆ ได้เลย

## กระบวนการ:
1. สร้าง 10+ ไอเดีย (หลากหลาย, สร้างสรรค์, practical)
2. จัดกลุ่ม
3. เน้น top 3 ที่น่าสนใจที่สุด
4. บันทึกไอเดีย "wild card" ที่น่าสำรวจ
5. ถามผู้ใช้ว่าสนใจอันไหน

## บันทึก:
ไอเดียน่าสนใจ → ψ/memory/learnings.md (tag: brainstorm)
ไอเดียที่จะทำต่อ → ψ/inbox/

