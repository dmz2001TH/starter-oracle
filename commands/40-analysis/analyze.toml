description = "วิเคราะห์เชิงลึก — โค้ด ข้อมูล หรือปัญหา"

prompt = """
วิเคราะห์เชิงลึกของสิ่งที่ระบุ

เป้าหมาย: $ARGUMENTS

## Framework การวิเคราะห์:
1. **มันคืออะไร**: อธิบายให้ชัด
2. **ทำงานยังไง**: กลไก/กระบวนการ
3. **ทำไมเป็นแบบนี้**: การตัดสินใจออกแบบ
4. **ปัญหา**: มีปัญหาอะไรบ้าง?
5. **โอกาส**: ปรับปรุงอะไรได้?
6. **Patterns**: มี pattern อะไรโผล่มา?

## บันทึก findings:
- Pattern ใหม่ → ψ/memory/patterns.md
- Learning ใหม่ → ψ/memory/learnings.md
- ปัญหาที่พบ → ψ/inbox/[ชื่อ-fix].md

## นำเสนอ:
```markdown
## 🔬 วิเคราะห์: [เป้าหมาย]

### ภาพรวม
- [มันคืออะไร]

### ทำงานยังไง
- [กลไก]

### ค้นพบสำคัญ
1. [finding]
2. [finding]

### ปัญหา
- [ปัญหา + ความรุนแรง]

### คำแนะนำ
- [ข้อเสนอปรับปรุง]

### Patterns ที่ค้นพบ
- [patterns ที่注意到]
```

ตอบเป็นภาษาไทย
"""
