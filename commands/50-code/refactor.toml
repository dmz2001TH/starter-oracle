description = "Refactor — ปรับปรุงโค้ดให้ดีขึ้น โดยไม่เปลี่ยนพฤติกรรม"

prompt = """
Refactor โค้ดที่ระบุ

เป้าหมาย: $ARGUMENTS

## กลยุทธ์:
1. เข้าใจพฤติกรรมปัจจุบัน
2. ระบุ code smells
3. เสนอขั้นตอน refactor
4. แสดง before/after แต่ละการเปลี่ยนแปลง
5. ตรวจสอบว่าพฤติกรรมไม่เปลี่ยน

## นำเสนอ:
```markdown
## 🔧 Refactor: [เป้าหมาย]

### ปัญหาปัจจุบัน
- [code smell 1]
- [code smell 2]

### ขั้นตอน Refactor
1. [ขั้นตอน]: [before] → [after]
2. [ขั้นตอน]: [before] → [after]

### ผลลัพธ์สุดท้าย
[refactored code]

### ตรวจสอบ
- [ ] พฤติกรรมไม่เปลี่ยน
- [ ] Tests ยังผ่าน
- [ ] อ่านง่ายขึ้น
```

## บันทึก learnings เกี่ยวกับ refactoring patterns

ตอบเป็นภาษาไทย
"""
